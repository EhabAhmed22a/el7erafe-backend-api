name: Keep App Service Awake

on:
  schedule:
    # Runs every 15 minutes to stay under the 20-minute idle timeout
    - cron: '*/15 * * * *'
  # Allows you to trigger the ping manually from the GitHub Actions tab
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping el7erafe App Service
        # The curl command runs silently, drops the output, and only prints the HTTP status code.
        # --max-time 10 ensures the runner doesn't hang if the server is unresponsive.
        run: |
          STATUSCODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://el7rafeApp.azurewebsites.net/health)
          echo "Pinged App Service. Received status code: $STATUSCODE"
          
          if [ "$STATUSCODE" -ne 200 ]; then
            echo "Warning: App Service did not return a 200 OK."
            exit 1
          fi