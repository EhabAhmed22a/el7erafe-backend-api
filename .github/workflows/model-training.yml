name: Train, Test, and Deploy Safety Guard

on:
  push:
    branches: [ "newinfra" ]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install exactly what we need for training & testing
      - name: Install ML Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fasttext-wheel "numpy<2.0.0"

      # 4. Run the Training Script
      - name: Train Model 🧠
        run: python train.py

      # 5. THE GATEKEEPER: Run the QA tests
      # If this fails, steps 6, 7, and 8 will automatically cancel
      - name: Run Strict QA Tests 🧪
        run: python test.py

      # 6. Login to Azure
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 7. Build Image (Docker will grab the tested intent_model.bin)
      - name: Build and Push Docker Image 🚀
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/safety-guard-api:${{ github.sha }} .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/safety-guard-api:${{ github.sha }}

      # 8. Deploy to Azure Apps
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
          containerAppName: safety-guard-app          # UPDATE THIS
          resourceGroup: el7erafe-resource-group      # UPDATE THIS
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/safety-guard-api:${{ github.sha }}