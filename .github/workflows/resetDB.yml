name: Secure Reset Database Data (Entra ID)

on:
  workflow_dispatch:

# CRITICAL: This permissions block is required for OIDC passwordless authentication
permissions:
  id-token: write 
  contents: read  

jobs:
  reset-db:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Log into Azure using OIDC (Passwordless)
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 2. Write your SQL commands to a temporary file
      # (The Azure SQL Action requires a file path to execute)
      - name: Create SQL Script
        run: |
          cat << 'EOF' > ./reset_tables.sql
          SET NOCOUNT ON;
          DELETE FROM UserTokens;
          DELETE FROM UserConnections;
          DELETE FROM ServiceRequests;
          DELETE FROM Notifications;
          UPDATE Technicians SET ratings = 0;
          PRINT 'Data successfully cleared via Entra ID auth.';
          EOF

      # 3. Execute the script using the official Azure action
      - name: Execute SQL script
        uses: azure/sql-action@v2.3
        with:
          # This connection string tells it to use the OIDC token from Step 1 automatically
          connection-string: "Server=${{ secrets.DB_SERVER }};Initial Catalog=${{ secrets.DB_NAME }};Authentication=Active Directory Default;Encrypt=True;"
          path: './reset_tables.sql'