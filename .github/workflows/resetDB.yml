name: Reset Database Data (SQL Auth)

on:
  workflow_dispatch:

jobs:
  reset-db:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Write your SQL commands to a temporary file
      - name: Create SQL Script
        run: |
          cat << 'EOF' > ./reset_tables.sql
          SET NOCOUNT ON;
          DELETE FROM UserTokens;
          DELETE FROM UserConnections;
          DELETE FROM ServiceRequests;
          DELETE FROM Notifications;
          UPDATE Technicians SET Rating = 0;
          PRINT 'Data successfully cleared via standard SQL authentication.';
          EOF

      # 2. Execute the script using standard SQL credentials
      - name: Execute SQL script
        uses: azure/sql-action@v2.3
        with:
          connection-string: "Server=${{ secrets.DB_SERVER }};Initial Catalog=${{ secrets.DB_NAME }};User ID=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }};Encrypt=True;TrustServerCertificate=False;"
          path: './reset_tables.sql'